<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本格16タイプ診断</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f4f7f9; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 450px; text-align: center; }
        h1 { font-size: 22px; color: #5d5dff; margin-bottom: 20px; }
        .progress { font-size: 14px; color: #888; margin-bottom: 10px; }
        #question { font-size: 18px; font-weight: bold; margin-bottom: 30px; min-height: 60px; display: flex; align-items: center; justify-content: center; }
        button { display: block; width: 100%; margin: 12px 0; padding: 18px; border: none; border-radius: 12px; background: #5d5dff; color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.98); background: #4a4aff; }
        #result { display: none; }
        .type-code { font-size: 32px; color: #5d5dff; font-weight: bold; margin: 10px 0; }
        .type-name { font-size: 20px; color: #444; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="card">
    <div id="quiz">
        <div class="progress" id="progress">1 / 12</div>
        <div id="question">読み込み中...</div>
        <button onclick="answer(3)">非常にあてはまる</button>
        <button onclick="answer(1)">ややあてはまる</button>
        <button onclick="answer(-1)">あまりあてはまらない</button>
        <button onclick="answer(-3)">全くあてはまらない</button>
    </div>

    <div id="result">
        <h1>診断結果</h1>
        <div class="type-code" id="type-code"></div>
        <div class="type-name" id="type-name"></div>
        <p id="desc" style="line-height: 1.6; color: #666;"></p>
        <button onclick="location.reload()" style="background: #888; margin-top: 30px;">もう一度診断する</button>
    </div>
</div>

<script>
    const questions = [
        { q: "初対面の人でも自分から話しかける方だ", axis: "E" },
        { q: "一人の時間がないと疲れてしまう", axis: "I" },
        { q: "大人数のパーティーより少人数の集まりが好きだ", axis: "I" },
        { q: "現実的な事実よりも、将来の可能性にワクワクする", axis: "N" },
        { q: "物事を進める時は、経験やデータに基づきたい", axis: "S" },
        { q: "想像力が豊かで、よく空想にふける", axis: "N" },
        { q: "議論では感情よりも論理的な正しさを優先する", axis: "T" },
        { q: "人の気持ちに共感しやすく、相談されることが多い", axis: "F" },
        { q: "決断する時は、客観的なメリットを重視する", axis: "T" },
        { q: "旅行に行く時は、分単位で計画を立てたい", axis: "J" },
        { q: "締め切りギリギリにならないとやる気が出ない", axis: "P" },
        { q: "予定が急に変わっても、柔軟に対応できる", axis: "P" }
    ];

    const typeNames = {
        "INTJ": "戦略家", "INTP": "研究者", "ENTJ": "指揮官", "ENTP": "発明家",
        "INFJ": "提唱者", "INFP": "仲介者", "ENFJ": "主人公", "ENFP": "運動家",
        "ISTJ": "管理者", "ISFJ": "守護者", "ESTJ": "幹部", "ESFJ": "領事",
        "ISTP": "巨匠", "ISFP": "冒険家", "ESTP": "起業家", "ESFP": "エンターテイナー"
    };

    let current = 0;
    let scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };

    function showQuestion() {
        document.getElementById("progress").innerText = (current + 1) + " / " + questions.length;
        document.getElementById("question").innerText = questions[current].q;
    }

    function answer(val) {
        const axis = questions[current].axis;
        // ポイントを加算（重み付け）
        if (val > 0) scores[axis] += val;
        else scores[getOpposite(axis)] += Math.abs(val);

        current++;
        if (current < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function getOpposite(axis) {
        const pairs = { E:'I', I:'E', S:'N', N:'S', T:'F', F:'T', J:'P', P:'J' };
        return pairs[axis];
    }

    function showResult() {
        document.getElementById("quiz").style.display = "none";
        document.getElementById("result").style.display = "block";

        const res = 
            (scores.E >= scores.I ? "E" : "I") +
            (scores.S >= scores.N ? "S" : "N") +
            (scores.T >= scores.F ? "T" : "F") +
            (scores.J >= scores.P ? "J" : "P");

        document.getElementById("type-code").innerText = res;
        document.getElementById("type-name").innerText = typeNames[res] || "分析不能タイプ";
        document.getElementById("desc").innerText = "あなたは " + (scores.E >= scores.I ? "外交的" : "内向的") + " で、" + (scores.T >= scores.F ? "論理的" : "感情豊か") + " な傾向があります。";
    }

    showQuestion();
</script>
</body>
</html>
